AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Retro-fying Web Gateway - HTTP proxy for vintage browsers

Globals:
  Function:
    Timeout: 30
    MemorySize: 512

Resources:
  RetroProxyFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: retro-web-gateway
      Runtime: provided.al2023
      CodeUri: build/retro-web-gateway.zip
      Architectures:
        - x86_64
      Environment:
        Variables:
          MAGICK_CODER_MODULE_PATH: /var/task/lib/ImageMagick/coders
          MAGICK_CONFIGURE_PATH: /var/task/lib/ImageMagick/config
          LD_LIBRARY_PATH: /var/task/lib
          PATH: /var/task/bin:/usr/local/bin:/usr/bin:/bin
      FunctionUrlConfig:
        AuthType: NONE
      Events:
        ProxyRequest:
          Type: HttpApi
          Properties:
            ApiId: !Ref RetroApi
            Path: /proxy/{proxy+}
            Method: ANY
        Root:
          Type: HttpApi
          Properties:
            ApiId: !Ref RetroApi
            Path: /
            Method: GET

  RetroApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: prod

  RetroDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: Retro Web Gateway - TLS 1.0 compatible endpoint
        DefaultCacheBehavior:
          TargetOriginId: ApiGatewayOrigin
          ViewerProtocolPolicy: allow-all
          AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
          CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
          OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac
        Origins:
          - Id: ApiGatewayOrigin
            DomainName: !Sub "${RetroApi}.execute-api.${AWS::Region}.amazonaws.com"
            OriginPath: /prod
            CustomOriginConfig:
              HTTPSPort: 443
              OriginProtocolPolicy: https-only
              OriginSSLProtocols: [TLSv1.2]
        ViewerCertificate:
          CloudFrontDefaultCertificate: true
          MinimumProtocolVersion: SSLv3

Outputs:
  ProxyEndpoint:
    Description: API Gateway URL (modern browsers, TLS 1.2+)
    Value: !Sub "https://${RetroApi}.execute-api.${AWS::Region}.amazonaws.com/prod/proxy/"
  RetroEndpoint:
    Description: CloudFront URL (vintage browsers, plain HTTP on port 80)
    Value: !Sub "http://${RetroDistribution.DomainName}/"
